<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhavala Siri 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080400;
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #bubbleCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .bg-glow {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 70% 55% at 50% 10%, rgba(200,90,0,0.22) 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(245,166,35,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .center {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 52px;
    text-align: center;
    padding: 0 24px;
  }

  .title h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.8rem, 9vw, 5.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, #ffd06e 0%, #f5a623 45%, #b8741a 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.04em;
    line-height: 1.05;
  }
  .title p {
    margin-top: 12px;
    font-size: clamp(0.7rem, 2vw, 0.85rem);
    letter-spacing: 0.28em;
    color: rgba(245,166,35,0.45);
    text-transform: uppercase;
  }

  .btn-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  .btn-ring {
    position: relative;
    padding: 3px;
    border-radius: 62px;
    background: conic-gradient(
      from 0deg,
      #ffd06e, #ff6b00, #f5a623, #ff4500, #ffd06e
    );
    animation: spinRing 3s linear infinite;
    box-shadow:
      0 0 35px rgba(245,166,35,0.4),
      0 0 90px rgba(255,80,0,0.18);
  }
  @keyframes spinRing {
    to { filter: hue-rotate(25deg) brightness(1.1); }
  }

  .hero-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 22px 66px;
    font-family: 'Cinzel', serif;
    font-size: clamp(1rem, 3vw, 1.3rem);
    font-weight: 700;
    letter-spacing: 0.14em;
    color: #1a0800;
    cursor: pointer;
    border: none;
    outline: none;
    border-radius: 59px;
    background: linear-gradient(135deg, #ffd06e 0%, #f5a623 40%, #ff6b00 100%);
    animation: floatY 2.4s ease-in-out infinite;
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.3),
      inset 0 -2px 0 rgba(0,0,0,0.15);
    transition: transform 0.15s, box-shadow 0.2s;
    overflow: hidden;
    white-space: nowrap;
    text-decoration: none;
  }

  .hero-btn::after {
    content: '';
    position: absolute;
    top: -10%;
    left: -65%;
    width: 38%;
    height: 120%;
    background: linear-gradient(105deg, transparent, rgba(255,255,255,0.35), transparent);
    animation: shineSweep 3.5s ease-in-out infinite;
  }
  @keyframes shineSweep {
    0%   { left: -65%; }
    38%  { left: 130%; }
    100% { left: 130%; }
  }

  @keyframes floatY {
    0%,100% { transform: translateY(0px); }
    50%      { transform: translateY(-10px); }
  }

  .hero-btn:hover {
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.3),
      0 14px 45px rgba(245,166,35,0.55);
    animation-play-state: paused;
    transform: translateY(-5px) scale(1.04);
  }
  .hero-btn:active { transform: scale(0.97); animation-play-state: paused; }

  .btn-icon { font-size: 1.4em; }

  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    transform: scale(0);
    animation: rippleOut 0.65s linear forwards;
    pointer-events: none;
  }
  @keyframes rippleOut {
    to { transform: scale(5); opacity: 0; }
  }
</style>
</head>
<body>

<canvas id="bubbleCanvas"></canvas>
<div class="bg-glow"></div>

<div class="center">
  <div class="title">
    <h1>Dhavala Siri</h1>
    <p>Sri Dhavala College · Moodabidri · 2025–26</p>
  </div>

  <div class="btn-wrap">
    <div class="btn-ring">
      <a class="hero-btn" id="heroBtn"
         href="https://www.instagram.com/p/DW0Pzwrk3QG/"
         target="_blank" rel="noopener">
        <span class="btn-icon">🎭</span>
        Click Here
      </a>
    </div>
  </div>
</div>

<script>
/* ── BUBBLES ── */
const canvas = document.getElementById('bubbleCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Bubble {
  constructor() { this.reset(true); }
  reset(init = false) {
    this.x = Math.random() * canvas.width;
    this.y = init ? Math.random() * canvas.height : canvas.height + 40;
    this.r = 4 + Math.random() * 22;
    this.speed = 0.2 + Math.random() * 0.5;
    this.drift = (Math.random() - 0.5) * 0.3;
    this.alpha = 0.05 + Math.random() * 0.14;
    this.hue = 22 + Math.random() * 22;
    this.phase = Math.random() * Math.PI * 2;
  }
  update() {
    this.y -= this.speed;
    this.x += Math.sin(this.phase + Date.now() * 0.0007) * 0.45 + this.drift;
    this.phase += 0.007;
    if (this.y + this.r < 0) this.reset();
  }
  draw() {
    const g = ctx.createRadialGradient(
      this.x - this.r * 0.3, this.y - this.r * 0.3, this.r * 0.1,
      this.x, this.y, this.r
    );
    g.addColorStop(0, `hsla(${this.hue}, 100%, 88%, ${this.alpha * 2})`);
    g.addColorStop(0.5, `hsla(${this.hue}, 90%, 58%, ${this.alpha})`);
    g.addColorStop(1, `hsla(${this.hue}, 80%, 35%, 0)`);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.strokeStyle = `hsla(${this.hue + 10}, 100%, 78%, ${this.alpha * 0.5})`;
    ctx.lineWidth = 0.7;
    ctx.stroke();
  }
}

const bubbles = Array.from({ length: 55 }, () => new Bubble());
(function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  bubbles.forEach(b => { b.update(); b.draw(); });
  requestAnimationFrame(loop);
})();

/* ── RIPPLE ── */
document.getElementById('heroBtn').addEventListener('click', function(e) {
  const rect = this.getBoundingClientRect();
  const rpl = document.createElement('span');
  rpl.className = 'ripple';
  const sz = Math.max(rect.width, rect.height);
  rpl.style.cssText = `width:${sz}px;height:${sz}px;left:${e.clientX-rect.left-sz/2}px;top:${e.clientY-rect.top-sz/2}px`;
  this.appendChild(rpl);
  rpl.addEventListener('animationend', () => rpl.remove());
});
</script>
</body>
</html>
